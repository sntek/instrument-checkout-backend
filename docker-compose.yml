services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-instrument}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-instrument}
      POSTGRES_DB: ${POSTGRES_DB:-instrument_checkout}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-instrument} -d ${POSTGRES_DB:-instrument_checkout}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-instrument}:${POSTGRES_PASSWORD:-instrument}@db:5432/${POSTGRES_DB:-instrument_checkout}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  cron:
    build: .
    restart: unless-stopped
    command: ["node", "cron.mjs"]
    environment:
      PORT: "3000"
    depends_on:
      - app

volumes:
  pgdata:
